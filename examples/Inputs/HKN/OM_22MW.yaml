#        MTTW_L: 24 # logistics waiting time in hours
# ============================================================================
# 22 MW REFERENCE TURBINE – O&M SCALING FROM 15 MW BASELINE (COSTS @2025)
#
# Baseline: 15 MW O&M library (failure modes + PM) for an offshore turbine.
# This file is a *derived* version for a 22 MW reference turbine using
# simple power-based scaling rules and a cost inflation from 2015 to 2025.
#
# Power rating:
#   P_old = 15 MW
#   P_new = 22 MW
#   size_factor = P_new / P_old ≈ 1.47
#
# General scaling pattern (technical)
# -----------------------------------
# For each failure mode and PM entry, three quantities are scaled w.r.t. size:
#
#   - Weibull scale parameter (MTBF in years):
#         scale_new = scale_old / size_factor^α
#
#   - Repair / service time (hours):
#         time_new  = time_old  * size_factor^γ
#
#   - Base materials cost in 2015 euros:
#         materials_22MW_2015 = materials_15MW_2015 * size_factor^β
#
# The shape parameter k (here = 1, exponential) is kept unchanged.
# Frequencies for annual PM (365 days) are kept unchanged; only their
# time and materials are scaled.
#
# Cost inflation (2015 → 2025)
# ----------------------------
# All *materials* values in this file are further inflated from 2015 EUR
# to 2025 EUR using a 5% annual rate over 10 years:
#
#   inflation_factor = 1.05^10 ≈ 1.6289
#
#   materials_2025 = round(materials_22MW_2015 * inflation_factor)
#
# All `materials:` figures below are given in 2025 EUR.
#
# Exponents by component (α for scale, β for materials, γ for time)
# -----------------------------------------------------------------
# 1) Rotor blades (rotor_blades)
#    - Failure scale:    α = 0.7  (bigger blades → higher loads → higher failure rate)
#    - Materials:        β_minor = 1.2, β_major/replacement = 1.4
#    - Time:             γ_minor = 0.3, γ_major/replacement = 0.5
#
# 2) Drive train (drive_train – main shaft, etc.)
#    - Failure scale:    α = 0.5
#    - Materials:        β_minor = 1.0, β_major/replacement = 1.2
#    - Time:             γ_minor = 0.25, γ_major/replacement = 0.4
#
# 3) Generator + power converter (generator, power_converter)
#    - Failure scale:    α = 0.3
#    - Materials:        β_minor = 0.8, β_major/replacement = 1.1
#    - Time:             γ_minor = 0.2, γ_major/replacement = 0.35
#
# 4) Electrical system in turbine (electrical_system)
#    - Failure scale:    α = 0.3
#    - Materials:        β_minor = 0.8, β_major/replacement = 1.1
#    - Time:             γ_minor = 0.2, γ_major/replacement = 0.35
#
# 5) Hydraulic pitch system + yaw system (hydraulic_pitch_system, yaw_system)
#    - Failure scale:    α = 0.1  (weak dependence on rating; more count-driven)
#    - Materials:        β_minor = 0.6, β_major/replacement = 0.9
#    - Time:             γ_minor = 0.1, γ_major/replacement = 0.25
#
# 6) Transformer (OSS-level) (transformer)
#    - Failure scale:    α = 0.1  (mild scaling with project size)
#    - Materials:        β_minor = 0.7, β_major = 1.0
#    - Time:             γ_minor = 0.15, γ_major = 0.3
#
# 7) Preventive maintenance / inspections
#    - Turbine annual service, generator annual inspection, supporting structure
#      inspection, transformer annual inspection:
#           time_new      ≈ time_old      * size_factor^0.25–0.3
#           materials_new ≈ materials_old * size_factor^0.4 (≈ modest increase),
#      then inflated to 2025 EUR as above.
#
# Notes
# -----
# - Vessel types (CTV vs LCN) and frequencies are unchanged; only the
#   per-event time and materials are scaled.
# - The structure (components, failure modes, descriptions) stays identical
#   to the 15 MW baseline to keep compatibility with your existing code.
# ============================================================================

