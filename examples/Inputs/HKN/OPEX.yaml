OM_Process:
  OM_input_file: "OM_22MW.yaml"
  OM_Vessel_input_file: "OM_Vessels.yaml"
  Simulation_Mode: "analytic_ctmc" # options: [capex_fraction, analytic_ctmc, time_march_ctmc]
  OM_overhead: 25 # [k€/MW/year] fixed annual overhead cost per MW installed: Insurerance, administration, Onshore operations, Onshore staff, grid connection fees etc. 

  capex_fraction:
      capex_fraction: 0.30
      n_yearly_payments: 12

  analytic_ctmc:
      p_access_hourly: 0.1 # for now this is directly treated a a transition rate from WAITING to REPAIR
      uncertainty:
        flag_apply: true
        lamda_sigma: 0.3 # lognormal standard deviation for failure rates
        mttr_sigma: 0.2  # lognormal standard deviation for MTTR
        mttwL_sigma: 0.2 # lognormal standard deviation for MTTW        

  time_march_ctmc:
      dummy_param: true
