OM_Process:
  OM_input_file: "OM_22MW.yaml"
  OM_Vessel_input_file: "OM_Vessels.yaml"
  Simulation_Mode: "analytic_ctmc"

  OM_overhead: 25   # [k€/MW/year] fixed annual overhead cost per MW installed

  capex_fraction:
    capex_fraction: 0.30
    n_yearly_payments: 12

  analytic_ctmc:
    p_access_hourly: 0.1   # treated as weather access rate

    uncertainty:
      # --- Epistemic uncertainty on failure rates (CM only) ---
      flag_apply_epistemic_lambda: false
      process_anchor: "median"  # "median" or "mean", this controls if the mean or median of the gamma is preserved when applying lambda_gamma_cv
      lambda_gamma_cv: 0.30   # coefficient of variation of λ

      # --- Process uncertainty on durations / waits ---
      flag_apply_process: false
      process_anchor: "median"  # "median" or "mean", this controls if the mean or median of the lognormal is preserved when applying the sigmas
      mttr_sigma: 0.20        # lognormal sigma for MTTR
      mttwL_sigma: 0.20       # lognormal sigma for MTTW_L

    mean_shift:
      flag_apply: true
      lambda_factor: 1.0     # deterministic shift of failure rates
      mttr_factor: 1.0       # deterministic shift of MTTR
      mttwL_factor: 1.0      # deterministic shift of logistics waiting
      tau_factor: 1.0        # deterministic shift of PM interval

  time_march_ctmc:
    dummy_param: true
